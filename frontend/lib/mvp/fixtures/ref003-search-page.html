<!DOCTYPE html>
<html lang="ru">
  <head>
    <title>Аптеки ростова и области - Онлайн справочная</title>
  </head>
  <body>
    <form id="searchform" name="searchform" method="get" action="http://www.ref003.ru/index.php/search">
      <input id="type_drug_torg" type="radio" name="type_drugname" value="torg" checked />
      <input id="type_drug_mnn" type="radio" name="type_drugname" value="mnn" />
      <input id="drugname" type="text" name="drugname" value="" />
      <input id="drugname_id" type="hidden" name="drugname_id" value="0" />

      <select id="city_id" name="city_id">
        <option value="0" selected>Ростов-на-Дону и область</option>
        <option value="16">Азов</option>
        <option value="18">Аксай</option>
      </select>

      <select id="area_id" name="area_id">
        <option value="0" selected>Все районы</option>
        <option value="1">Первомайский</option>
        <option value="4">Ворошиловский</option>
      </select>

      <button type="submit">Искать</button>
    </form>
  </body>
</html>
